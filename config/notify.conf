# Configuration for scripts/soc-notify — sourced by the script, not
# hardcoded there, specifically so switching notification backend/channel
# is a config edit, not a script change. See documentation/escalation.md.

# ntfy.sh server. Public instance by default. To move to a self-hosted
# instance later, change this one line:
#   NTFY_SERVER="https://ntfy.your-domain.example"
NTFY_SERVER="https://ntfy.sh"

# Topic to publish to. Treat this like a shared secret on the public
# instance (anyone who knows it can publish/subscribe) — generate your
# own long/random topic before deploying, don't reuse this placeholder:
#   tr -dc 'A-Za-z0-9' < /dev/urandom | head -c 16
NTFY_TOPIC="CHANGE-ME-generate-your-own-random-topic"
